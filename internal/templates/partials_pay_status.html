<div class="rounded-xl border border-slate-200 bg-white p-5">
  <p class="text-sm text-slate-500">Reference {{.Payment.Reference}}</p>
  <h2 class="mt-1 text-2xl font-semibold">{{statusHeadline .Payment.Status}}</h2>
  <p class="mt-2 text-sm text-slate-600">Amount: {{fmtCents .Payment.AmountCents .Payment.Currency}}</p>
  <p class="mt-1 text-sm text-slate-600">Last update: {{fmtDateTime .Payment.UpdatedAt}}</p>
  {{if eq .Payment.Status "SETTLED"}}<a href="/pay/{{.Payment.ID}}/success" class="mt-3 inline-block text-cyan-700 underline">Open success page</a>{{end}}
  {{if eq .Payment.Status "FAILED"}}<a href="/pay/{{.Payment.ID}}/failed" class="mt-3 inline-block text-rose-700 underline">Open failed page</a>{{end}}
</div>
