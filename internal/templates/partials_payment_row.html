<tr class="border-b border-slate-200">
  <td class="px-3 py-2 text-sm">{{.Reference}}</td>
  <td class="px-3 py-2 text-sm">{{.PayerName}}</td>
  <td class="px-3 py-2 text-sm">{{.PayerEmail}}</td>
  <td class="px-3 py-2 text-sm">{{fmtCents .AmountCents .Currency}}</td>
  <td class="px-3 py-2 text-sm"><span class="rounded px-2 py-1 text-xs font-semibold {{statusClass .Status}}">{{.Status}}</span></td>
  <td class="px-3 py-2 text-sm">{{fmtDateTime .CreatedAt}}</td>
  <td class="px-3 py-2 text-sm"><a class="text-cyan-700 underline" href="/pay/{{.ID}}" target="_blank">Open</a></td>
  <td class="px-3 py-2 text-sm">
    {{if eq .Status "SETTLED"}}
      <a class="text-rose-700 underline" href="/admin/payment-requests/{{.ID}}/refund">Refund</a>
    {{else}}
      -
    {{end}}
  </td>
</tr>
