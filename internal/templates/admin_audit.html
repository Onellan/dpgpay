<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DPG Pay Audit</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl px-4 py-6">
    <a href="/admin" class="text-sm text-cyan-700 underline">Back to admin home</a>
    <h1 class="mt-2 text-2xl font-bold">Audit log</h1>
    <div class="mt-4 overflow-auto rounded border border-slate-200 bg-white">
      <table class="w-full text-left text-sm">
        <thead><tr class="border-b border-slate-200 text-xs uppercase text-slate-500"><th class="px-3 py-2">Time</th><th class="px-3 py-2">Event</th><th class="px-3 py-2">Actor</th><th class="px-3 py-2">Reference</th><th class="px-3 py-2">Detail</th></tr></thead>
        <tbody>
          {{range .Logs}}
          <tr class="border-b border-slate-100 align-top"><td class="px-3 py-2">{{fmtDateTime .CreatedAt}}</td><td class="px-3 py-2">{{.EventType}}</td><td class="px-3 py-2">{{.Actor}}</td><td class="px-3 py-2">{{.ReferenceID}}</td><td class="px-3 py-2"><pre class="whitespace-pre-wrap text-xs">{{.Detail}}</pre></td></tr>
          {{else}}<tr><td colspan="5" class="px-3 py-4 text-slate-500">No audit events.</td></tr>{{end}}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
