<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Status {{.Payment.Reference}} | DPG Pay</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto max-w-xl px-4 py-8">
    <h1 class="text-2xl font-bold">Payment status tracker</h1>
    <p class="mt-1 text-sm text-slate-600">Bookmark this page to follow settlement progress.</p>
    <div class="mt-4" hx-get="/pay/{{.Payment.ID}}/status/fragment" hx-trigger="load, every 10s" hx-swap="innerHTML"></div>
  </main>
</body>
</html>
