<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DPG Pay Settlements</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-5xl px-4 py-6">
    <div class="flex items-center justify-between">
      <div>
        <a href="/admin" class="text-sm text-cyan-700 underline">Back to admin home</a>
        <h1 class="mt-2 text-2xl font-bold">Settlement runs</h1>
      </div>
      <form hx-post="/admin/settlements/run" hx-target="body" hx-swap="outerHTML">
        {{.CSRFField}}
        <button class="rounded bg-slate-900 px-4 py-2 text-white">Trigger settlement</button>
      </form>
    </div>

    <div class="mt-6 overflow-auto rounded border border-slate-200 bg-white">
      <table class="w-full text-left text-sm">
        <thead><tr class="border-b border-slate-200 text-xs uppercase text-slate-500"><th class="px-3 py-2">ID</th><th class="px-3 py-2">Triggered</th><th class="px-3 py-2">Amount</th><th class="px-3 py-2">Entries</th><th class="px-3 py-2">Status</th><th class="px-3 py-2">Completed</th></tr></thead>
        <tbody>
          {{range .Settlements}}
          <tr class="border-b border-slate-100"><td class="px-3 py-2">{{.ID}}</td><td class="px-3 py-2">{{fmtDateTime .TriggeredAt}}</td><td class="px-3 py-2">{{.AmountCents}}</td><td class="px-3 py-2">{{.EntryCount}}</td><td class="px-3 py-2">{{.Status}}</td><td class="px-3 py-2">{{fmtDateTimePtr .CompletedAt}}</td></tr>
          {{else}}
          <tr><td colspan="6" class="px-3 py-4 text-slate-500">No settlement runs yet.</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
