<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Settled | DPG Pay</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-emerald-50 text-slate-900">
  <main class="mx-auto max-w-xl px-4 py-10 text-center">
    <div class="rounded-2xl border border-emerald-200 bg-white p-8">
      <h1 class="text-3xl font-bold text-emerald-700">Payment settled</h1>
      <p class="mt-3">Reference {{.Payment.Reference}} was settled successfully.</p>
      <a href="/pay/{{.Payment.ID}}/status" class="mt-4 inline-block text-cyan-700 underline">View status page</a>
    </div>
  </main>
</body>
</html>
